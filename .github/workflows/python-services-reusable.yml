# Shared jobs: ruff + pytest for each Python microservice under services/
name: Python services (ruff + pytest)

on:
  workflow_call:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth
          - catalog
          - commerce
          - counterparties
          - custom
          - directory
          - fulfillment
          - inventory
          - notification
          - oms
          - payments
          - procurement
          - production
          - wms

    steps:
      - name: Use HTTPS for GitHub submodule URLs
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            services/${{ matrix.service }}/requirements.txt
            services/${{ matrix.service }}/requirements-dev.txt

      - name: Install dependencies and dev tools
        working-directory: services/${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
          if [[ -f requirements-dev.txt ]]; then
            pip install -r requirements-dev.txt
          else
            pip install ruff
          fi

      - name: Local config from example
        working-directory: services/${{ matrix.service }}
        run: |
          if [[ -f config.ini.example ]]; then cp config.ini.example config.ini; fi

      - name: Ruff check
        working-directory: services/${{ matrix.service }}
        run: ruff check .

      - name: Ruff format
        working-directory: services/${{ matrix.service }}
        run: ruff format --check .

      - name: Pytest
        working-directory: services/${{ matrix.service }}
        env:
          PYTHONPATH: ${{ github.workspace }}/services/${{ matrix.service }}
        run: pytest tests/ -v --tb=short
