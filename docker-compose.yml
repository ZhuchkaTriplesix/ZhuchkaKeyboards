# Local infrastructure: PostgreSQL, Redis, MinIO (S3-compatible media), Traefik (dashboard + Docker provider).
# Auth service: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#
# Traefik: web entry on host port 8080, dashboard on 8081 (insecure API, dev only).
# MinIO: S3 API http://localhost:9000, web console http://localhost:9001 (dev credentials in MINIO_ROOT_*).
# Buckets keyboards + parts are created by minio-init (ignore-existing on re-runs).
# DB/cache images: Debian Trixie–based official builds (pinned versions).
# If you upgrade from an older major Postgres image, remove volume zhuchka_pgdata or run pg_upgrade.
# PG 18+ images expect a single mount at /var/lib/postgresql (not .../data); see docker-library/postgres#1259.
# docker/postgres/docker-entrypoint-initdb.d/*.sql run only on first init (empty data dir).

services:
  postgres:
    image: postgres:18.3-trixie
    environment:
      POSTGRES_USER: zhuchka
      POSTGRES_PASSWORD: zhuchka
      POSTGRES_DB: zhuchka_auth
    ports:
      - "5432:5432"
    volumes:
      - zhuchka_pgdata:/var/lib/postgresql
      - ./docker/postgres/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhuchka -d zhuchka_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.6.1-trixie
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - zhuchka_redis:/data

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: zhuchka
      MINIO_ROOT_PASSWORD: zhuchka-minio-dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - zhuchka_minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s

  # One-shot: create default buckets for keyboard and parts imagery (idempotent).
  minio-init:
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "mc alias set local http://minio:9000 zhuchka zhuchka-minio-dev && mc mb local/keyboards --ignore-existing && mc mb local/parts --ignore-existing"
    restart: "no"

  traefik:
    # v3.0 uses Docker API 1.24; Engine 29+ requires min API 1.44 — provider breaks with empty "Error response from daemon".
    image: traefik:v3.6
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "8080:80"
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  zhuchka_pgdata:
  zhuchka_redis:
  zhuchka_minio:
