# Alembic for local Docker — URL matches docker/fulfillment/config.dev.ini

[alembic]
script_location = src/database/alembic
prepend_sys_path = .
version_path_separator = os
output_encoding = utf-8

sqlalchemy.url = postgresql+asyncpg://zhuchka:zhuchka@postgres:5432/zhuchka_fulfillment

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
