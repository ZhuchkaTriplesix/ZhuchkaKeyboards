# Local Docker Compose — commerce service. Weak credentials; not for production.
# Mounted as /app/config.ini for services/commerce container.

[POSTGRES]
DATABASE = postgresql
DRIVER = asyncpg
DATABASE_NAME = zhuchka_commerce
USERNAME = zhuchka
PASSWORD = zhuchka
IP = postgres
PORT = 5432
DATABASE_ENGINE_POOL_TIMEOUT = 30
DATABASE_ENGINE_POOL_RECYCLE = 3600
DATABASE_ENGINE_POOL_SIZE = 5
DATABASE_ENGINE_MAX_OVERFLOW = 10
DATABASE_ENGINE_POOL_PING = true
DATABASE_ECHO = false

[UVICORN]
HOST = 0.0.0.0
PORT = 8000
WORKERS = 1
LOOP = asyncio
HTTP = auto

[REDIS]
HOST = redis
PORT = 6379
DB = 0
PASSWORD =
