# Local Docker Compose only — weak credentials; not for production.
# Mounted as /app/config.ini for services/auth container.

[POSTGRES]
DATABASE = postgresql
DRIVER = asyncpg
DATABASE_NAME = zhuchka_auth
USERNAME = zhuchka
PASSWORD = zhuchka
IP = postgres
PORT = 5432
DATABASE_ENGINE_POOL_TIMEOUT = 30
DATABASE_ENGINE_POOL_RECYCLE = 3600
DATABASE_ENGINE_POOL_SIZE = 5
DATABASE_ENGINE_MAX_OVERFLOW = 10
DATABASE_ENGINE_POOL_PING = true
DATABASE_ECHO = false

[UVICORN]
HOST = 0.0.0.0
PORT = 8000
WORKERS = 1
LOOP = asyncio
HTTP = auto

[REDIS]
HOST = redis
PORT = 6379
DB = 0
PASSWORD =

[AUTH]
# Public URL: use Traefik entry (see docker-compose) or http://localhost:8000 if you publish auth port.
ISSUER = http://auth.localhost:8080
AUDIENCE = zhuchka-api
ACCESS_TOKEN_MINUTES = 15
REFRESH_TOKEN_DAYS = 30
JWT_PRIVATE_KEY_PATH = var/jwt_private.pem
BOOTSTRAP_ADMIN_EMAIL = admin@local.dev
BOOTSTRAP_ADMIN_PASSWORD = ChangeMeLocal!
BOOTSTRAP_CLIENT_ID = zhuchka-dev
BOOTSTRAP_CLIENT_SECRET = change-me-dev-only
PASSWORD_GRANT_ENABLED = true
TELEGRAM_BOT_TOKEN =
GOOGLE_CLIENT_IDS =
PUBLIC_OAUTH_CLIENT_ID = zhuchka-market-web
PUBLIC_OAUTH_REDIRECT_URIS = http://127.0.0.1/callback http://localhost/callback
BROWSER_LOGIN_COOKIE_NAME = oauth_browser_login
BROWSER_LOGIN_MINUTES = 15
COOKIE_SECURE = false
AUTHORIZATION_CODE_MINUTES = 10
