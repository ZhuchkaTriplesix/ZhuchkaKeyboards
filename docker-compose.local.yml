# Overlay: all Python API services behind Traefik + direct host ports for debugging.
# Prerequisite: add to hosts — 127.0.0.1 auth.localhost catalog.localhost commerce.localhost
#   payments.localhost directory.localhost oms.localhost fulfillment.localhost inventory.localhost
#   wms.localhost production.localhost custom.localhost procurement.localhost
#   counterparties.localhost notification.localhost market.localhost system.localhost
#
# Usage (from monorepo root):
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build
#
# Traefik: ниже проброс 80:80 — удобно открывать сайты без :8080 в URL.
#   Telegram /setdomain не принимает *.localhost — для Login Widget используйте market.localtest.me
#   (маршрут market-web-localtest) и этот же хост в @BotFather. На Windows порт 80 может быть занят.
#
# Open (examples):
#   http://auth.localhost:8080/.well-known/openid-configuration
#   http://catalog.localhost:8080/api/openapi.json
# Direct ports: auth :8000, catalog :8001, commerce :8002, payments :8003, directory :8004,
#   oms :8005, fulfillment :8006, inventory :8007, wms :8008, production :8009, custom :8010,
#   procurement :8011, counterparties :8012, notification :8013
# Flutter web (nginx): только через Traefik — http://market.localhost:8080 и http://system.localhost:8080
#   (build args указывают API на *.localhost:8080; нужен hosts как выше)
# Telegram long-poll: auth_bot (bots/auth_bot) — TELEGRAM_BOT_TOKEN из корневого `.env` (как у auth)

services:
  traefik:
    ports:
      - "80:80"

  auth:
    build:
      context: ./services/auth
      dockerfile: docker/Dockerfile
    environment:
      # Set in repo-root `.env` (gitignored); do not commit tokens. Overrides [AUTH] TELEGRAM_BOT_TOKEN in config.ini.
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    volumes:
      - ./docker/auth/config.dev.ini:/app/config.ini:ro
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=Host(`auth.localhost`)"
      - "traefik.http.routers.auth.entrypoints=web"
      - "traefik.http.services.auth.loadbalancer.server.port=8000"
      # Тот же auth API без hosts: резолвится как 127.0.0.1 (как market.localtest.me) — для POST /oauth/federated/telegram из браузера.
      - "traefik.http.routers.auth-localtest.rule=Host(`auth.localtest.me`)"
      - "traefik.http.routers.auth-localtest.entrypoints=web"
      - "traefik.http.routers.auth-localtest.service=auth"

  catalog:
    build:
      context: ./services/catalog
      dockerfile: docker/Dockerfile
    volumes:
      - ./docker/catalog/config.dev.ini:/app/config.ini:ro
      - ./docker/catalog/alembic.ini:/app/alembic.ini:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["sh", "-c", "alembic upgrade head && exec python src/main.py"]
    ports:
      - "8001:8000"
    labels:
      - "traefik.enable=true"
